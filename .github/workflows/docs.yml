name: Deploy Tutorial Site

# Manual-only by design. This workflow NEVER runs automatically: there is no
# push/pull_request trigger, so merging to main does not publish anything.
# Trigger it by hand from the Actions tab once you explicitly want the tutorial
# live on GitHub Pages.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build the MkDocs site
        run: >-
          uvx --with pymdown-extensions --with mkdocs-material
          --with ./docs/sushi-pygments
          --from mkdocs mkdocs build --strict -f mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
