name: Deploy Docs Site

# Deploys automatically after the Tests workflow succeeds on main (code only
# reaches main through the PR / merge-queue gate, so tests have already passed
# by then). Still triggerable by hand from the Actions tab.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Manual runs always build; automatic runs only after Tests succeeded on main.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build the MkDocs site
        run: >-
          uvx --with pymdown-extensions --with mkdocs-material
          --with ./docs/sushi-pygments
          --from mkdocs mkdocs build --strict -f mkdocs.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
