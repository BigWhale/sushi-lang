name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

jobs:
  pytest:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for code changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            code:
              - 'sushi_lang/**'
              - 'tests/**'
              - '.github/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'sushic'

      - name: Set up Sushi toolchain
        if: github.event_name != 'pull_request' || steps.changes.outputs.code == 'true'
        uses: ./.github/actions/setup-sushi

      - name: Run unit tests (pytest)
        if: github.event_name != 'pull_request' || steps.changes.outputs.code == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run pytest -q

  test-linux:
    needs: pytest
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for code changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            code:
              - 'sushi_lang/**'
              - 'tests/**'
              - '.github/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'sushic'

      - name: Set up Sushi toolchain
        if: github.event_name != 'pull_request' || steps.changes.outputs.code == 'true'
        uses: ./.github/actions/setup-sushi

      - name: Run tests
        if: github.event_name != 'pull_request' || steps.changes.outputs.code == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run python tests/run_tests.py --enhanced

  test-macos:
    needs: pytest
    if: github.event_name != 'push'
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for code changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            code:
              - 'sushi_lang/**'
              - 'tests/**'
              - '.github/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'sushic'

      - name: Set up Sushi toolchain
        if: github.event_name != 'pull_request' || steps.changes.outputs.code == 'true'
        uses: ./.github/actions/setup-sushi
        with:
          python-version: '3.13'

      - name: Run tests
        if: github.event_name != 'pull_request' || steps.changes.outputs.code == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --python 3.13 python tests/run_tests.py --enhanced

      - name: Docs-vs-code stdlib smoke check (macOS backend)
        if: github.event_name != 'pull_request' || steps.changes.outputs.code == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --python 3.13 python -m pytest tests/unit/test_docs_stdlib_smoke.py -q

  # Leak assertions are a dev-mode gate, not a CI job: `leaks` cannot attach on the
  # hosted macOS runner (no task_for_pid authorization), so it either is absent or
  # stalls, and the gate can only ever report "skipped" there. Run it locally before
  # pushing with `python tests/run_tests.py --leaks-only` (see PROGRESS.md / Tier 5).

  badges:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Sushi toolchain
        uses: ./.github/actions/setup-sushi

      - name: Run tests
        id: run_tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run python tests/run_tests.py --json > test_results.json || true
          cat test_results.json
        continue-on-error: true

      - name: Generate badge data
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run python << 'EOF'
          import json

          # Read test results
          with open('test_results.json', 'r') as f:
              results = json.load(f)

          total = results['total_tests']
          passed = results['passed']
          failed = results['failed']

          # Badge 1: Status (Pass/Fail)
          if failed == 0:
              status_badge = {
                  "schemaVersion": 1,
                  "label": "tests",
                  "message": "passing",
                  "color": "brightgreen"
              }
          else:
              status_badge = {
                  "schemaVersion": 1,
                  "label": "tests",
                  "message": "failing",
                  "color": "red"
              }

          # Badge 2: Total tests
          total_badge = {
              "schemaVersion": 1,
              "label": "total tests",
              "message": str(total),
              "color": "blue"
          }

          # Badge 3: Passed tests
          passed_badge = {
              "schemaVersion": 1,
              "label": "passed",
              "message": str(passed),
              "color": "brightgreen"
          }

          # Badge 4: Failed tests
          if failed == 0:
              failed_badge = {
                  "schemaVersion": 1,
                  "label": "failed",
                  "message": "0",
                  "color": "brightgreen"
              }
          else:
              failed_badge = {
                  "schemaVersion": 1,
                  "label": "failed",
                  "message": str(failed),
                  "color": "red"
              }

          # Save badge data
          with open('badge_status.json', 'w') as f:
              json.dump(status_badge, f)

          with open('badge_total.json', 'w') as f:
              json.dump(total_badge, f)

          with open('badge_passed.json', 'w') as f:
              json.dump(passed_badge, f)

          with open('badge_failed.json', 'w') as f:
              json.dump(failed_badge, f)

          print(f"Generated badges: {total} total, {passed} passed, {failed} failed")
          EOF

      - name: Update Gist with badge data
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Determine which Gist to use based on repository
          if [ "${{ github.repository }}" = "BigWhale/sushi-lang" ]; then
            GIST_ID="5bfbd5156dec23acfe18dd7956e251ba"
            echo "Using public Gist for sushi-lang repository"
          else
            GIST_ID="e893b92ba7b7561fae565f832f83159d"
            echo "Using dev Gist for sushi repository"
          fi

          # Update all badge files in a single API call
          echo "Updating Gist $GIST_ID with badge data..."

          STATUS_CONTENT=$(cat badge_status.json | jq -R -s '.')
          TOTAL_CONTENT=$(cat badge_total.json | jq -R -s '.')
          PASSED_CONTENT=$(cat badge_passed.json | jq -R -s '.')
          FAILED_CONTENT=$(cat badge_failed.json | jq -R -s '.')

          curl -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/gists/$GIST_ID \
            -d @- << EOF
          {
            "files": {
              "badge_status.json": {
                "content": $STATUS_CONTENT
              },
              "badge_total.json": {
                "content": $TOTAL_CONTENT
              },
              "badge_passed.json": {
                "content": $PASSED_CONTENT
              },
              "badge_failed.json": {
                "content": $FAILED_CONTENT
              }
            }
          }
          EOF

          echo "Successfully updated Gist with badge data"
