name: 'Set up Sushi toolchain'
description: 'Installs LLVM 20, uv and the project dependencies on Linux or macOS'

# Python version, and why CI does not match a 3.14 dev box:
#
# llvmlite 0.45.1 publishes no cp314 wheel, and its setuptools build backend fails
# against current setuptools on 3.14 ("spawn() got an unexpected keyword argument
# 'dry_run'"). Every job here therefore runs 3.13, where a prebuilt wheel exists:
# the Linux container ships 3.13 as its default interpreter, and macOS pins it.
#
# LLVM does NOT vary with the Python version. llvmlite bundles its own LLVM (a 100 MB
# shared library), so LLVM is 20.1.8 wherever llvmlite is 0.45.1. The system LLVM
# installed below supplies `clang` for the link step, not the backend.

inputs:
  python-version:
    description: 'Python version to sync/run with. Empty uses the project default.'
    required: false
    default: ''
  make-sushic-executable:
    description: 'chmod +x sushic after install'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        apt-get update
        apt-get install -y wget ca-certificates gnupg lsb-release curl build-essential cmake git jq

    - name: Install LLVM 20 (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor -o /usr/share/keyrings/llvm-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg allow-insecure=yes] http://apt.llvm.org/trixie/ llvm-toolchain-trixie-20 main" | tee /etc/apt/sources.list.d/llvm.list
        echo "deb-src [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg allow-insecure=yes] http://apt.llvm.org/trixie/ llvm-toolchain-trixie-20 main" | tee -a /etc/apt/sources.list.d/llvm.list
        apt-get update -o Acquire::AllowInsecureRepositories=true
        apt-get install -y --allow-unauthenticated llvm-20 llvm-20-dev clang-20
        # The IR-emission spike (tests/selfhost) shells out to a bare `clang` to
        # compile text .ll; macOS ships one via Xcode, Linux does not. Symlink the
        # versioned clang-20 onto PATH as `clang`.
        ln -sf "$(command -v clang-20)" /usr/local/bin/clang

    - name: Install LLVM 20 (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install llvm@20

    - name: Install uv from Astral
      shell: bash
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install Python dependencies with uv
      shell: bash
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        if [ "$RUNNER_OS" = "Linux" ]; then
          export LLVM_CONFIG=/usr/bin/llvm-config-20
        else
          export LLVM_CONFIG="$(brew --prefix llvm@20)/bin/llvm-config"
        fi
        if [ -n "${{ inputs.python-version }}" ]; then
          uv sync --extra dev --python "${{ inputs.python-version }}"
        else
          uv sync --extra dev
        fi

    - name: Make sushic executable
      if: inputs.make-sushic-executable == 'true'
      shell: bash
      run: chmod +x sushic
